name: CI/CD to On-Prem Kubernetes with Helm

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 소스 코드 체크아웃
        uses: actions/checkout@v4

      - name: ☕️ JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🛠 application.yml 생성
        run: |
          mkdir -p ./src/main/resources
          echo "${{ secrets.APPLICATION }}" > ./src/main/resources/application.yml

      - name: ⚡ Gradle Build (테스트 제외)
        run: ./gradlew build -x test

      - name: 🐳 Docker Build & Push to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker build -t ${{ secrets.DOCKER_USERNAME }}/admin-prod:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/admin-prod:latest
          docker logout

      # 깃에 커밋된 Helm 차트 폴더를 서버의 deploy-temp 폴더로 복사
      - name: 🚚 Helm 차트 서버로 전송 (SCP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.K8S_HOST }}
          port: ${{ secrets.K8S_PORT }}
          username: ${{ secrets.K8S_USERNAME }}
          key: ${{ secrets.K8S_PRIVATE_KEY }}
          source: "helm/admin-prod" # 깃 레포 내 Helm 경로
          target: "~/deploy-temp"
          strip_components: 0

      # 서버 접속 후 Helm 배포 실행
      - name: 🚀 Helm을 통한 쿠버네티스 배포
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.K8S_HOST }}
          port: ${{ secrets.K8S_PORT }}
          username: ${{ secrets.K8S_USERNAME }}
          key: ${{ secrets.K8S_PRIVATE_KEY }}
          script: |
            set -e
            
            # 1. 쿠버네티스 설정 로드 (이미 설정되어 있으므로 경로만 명시)
            export KUBECONFIG=$HOME/.kube/config

            echo "✅ 쿠버네티스 연결 테스트"
            kubectl get nodes

            echo "📦 Helm 차트 배포 시작"
            # SCP로 보낸 차트 위치: ~/deploy-temp/helm/admin-prod
            CHART_PATH="$HOME/deploy-temp/helm/admin-prod"

            helm upgrade --install admin-prod $CHART_PATH \
              --namespace default \
              --create-namespace \
              --set image.repository=${{ secrets.DOCKER_USERNAME }}/admin-prod \
              --set image.tag=latest \
              --set env.application="$(echo "${{ secrets.APPLICATION }}" | base64 -w 0)" \
              --set args[0]="--spring.profiles.active=prod,stub" \
              --set forceReload=$(date +%s)

            echo "🎉 배포 완료!"
